candidate_packet_id: "CAND-BASELINE-REALSOURCE-SINE400-V1"
candidate_label: "Real-source sine 400Hz baseline reference anchor"
candidate_version: "v1"
candidate_status: proposed

proposed_claim: >
  Under the declared medium FFT/Hann lens and within the
  daw_mic_sine_400hz cohort scope, the baseline phase profile is trusted
  as a stable comparison anchor for distinguishing perturbation and
  return-like recurrence in this family.

claim_type: baseline_reference_claim
claim_scope:
  source_family_scope: "daw_mic_sine_400hz"
  cohort_scope: "baseline_01-03 / perturb_01-03 / return_01-03 plus master_01-03"
  run_scope: "cohort-level, not single-run universalization"
  lens_scope: "medium FFT/Hann baseline only"
  temporal_scope: "current bounded experiment family only"
  reuse_scope: "comparison anchor for later same-family replay review"
explicit_non_claims:
  - "not semantic identity"
  - "not universal across all real-source families"
  - "not ontology"
  - "not prediction"
  - "not generalized attractor law"
  - "not a control policy"

source_family: "daw_mic_sine_400hz"
source_ids:
  - "mic_local_roomtone_sine400"
stream_ids:
  - "continuous_master_family"
  - "labeled_replay_family"
channel_modality_scope:
  - "mono audio / microphone"
run_lineage:
  - "baseline_01"
  - "baseline_02"
  - "baseline_03"
  - "perturb_01"
  - "perturb_02"
  - "perturb_03"
  - "return_01"
  - "return_02"
  - "return_03"
  - "master_01"
  - "master_02"
  - "master_03"
receipt_refs:
  - "cohort receipts and pinned packet refs preserved per real-source experiment"
pinned_packet_refs:
  - "bounded replay cohort packet for sine_400hz family"
preservation_posture:
  - "receipts"
  - "digest"
  - "pin"

declared_lens:
  nominal_fs: 48000
  effective_fs: 2400
  transform_family: "FFT/Hann"
  window_family: "Hann"
  window_N: 256
  hop_N: 128
  band_partition: "current real-source band-profile basis"
  segmentation_rule: "declared replay / continuous master rules"
  comparison_basis: "normalized band-profile comparison"
  scale_posture: "medium"
  replay_lens: "declared replay-honest lens"
lens_variation_tested:
  - "real FFT cleanup preserved same normalized structure"
  - "wavelets degraded current family"
  - "short/long passive scales compared; medium remained preferred"
lens_scope_note: "single-lens active baseline, comparison-tested against alternatives"

support_basis:
  - "replay_legitimacy_confirmed"
  - "cross_run_stability"
  - "return_similarity"
  - "profile_shift"
  - "concentration_support"
runtime_artifact_refs:
  - "A1"
  - "A2"
  - "W1"
  - "S1"
  - "H1"
  - "M1"
  - "A3"
read_side_probe_refs:
  - "real-source replay probe"
  - "continuous master phase probe"
  - "structural transition probe"
  - "spectral concentration probe"
cross_run_evidence: >
  Baseline vs perturbation separation is strong, baseline vs return is very small,
  continuous masters recover consistent boundaries and return-like structure,
  and the tighter-band family preserves the distinction cleanly under the
  active baseline lens.
real_source_support: "real-source"
preserved_distinctions:
  - "baseline vs perturbation"
  - "baseline vs return"
  - "narrow-band concentration vs broader redistribution"
collapsed_distinctions:
  - "none material for this narrow baseline-reference use"

ambiguity_posture: "bounded_ambiguity"
ambiguity_notes: >
  Claim is lens-scoped and family-scoped. It does not assert universal baseline
  truth outside this cohort family.
distortion_audit_status:
  audited_layers:
    - "real-source replay"
    - "transition vocabulary"
    - "spectral concentration support"
  severity: "low"
  downstream_impact: "bounded and acceptable for anchor use"
  recommended_action: "clarify_language_only"
authority_breaking_risks:
  - "later users forgetting the lens/family scope"

legitimacy_summary: >
  The claim is narrow, lens-declared, receipt-grounded, real-source supported,
  cross-run supported, and explicit about non-claims.
legitimacy_requirements_met:
  - "bounded claim"
  - "declared lens"
  - "replay-honest lineage"
  - "support basis sufficient"
  - "ambiguity within acceptable range"
  - "cross-run support adequate"
  - "non-claims explicit"
failure_risk_if_wrong: >
  Misreference of later same-family comparisons; low-to-moderate local review error,
  but limited blast radius if scope is preserved.

allowed_downstream_use:
  - "trusted baseline comparison anchor for this family"
  - "trusted return-vs-perturb comparison reference"
reuse_compression_benefit: "high"
packet_burden_if_not_promoted: >
  Each later same-family comparison must reopen the full baseline packet and
  re-establish the same anchor repeatedly.
utility_summary: >
  This candidate materially compresses lawful repeated comparison for a narrow,
  declared use-case without needing broad interpretive uplift.

governability_summary: >
  This claim is small, scope-fenced, lens-scoped, and easy to contest or revoke.
scope_inflation_risk: "moderate"
authority_gravity_risk: "low"
contestability_path: >
  Future same-family cohorts or cross-lens contradictions may challenge the
  anchor’s stability or narrow its scope.
revocation_or_supersession_path: >
  Narrow to a smaller cohort, supersede with stronger multi-family baseline,
  or revoke if later evidence breaks return/reference stability.
blast_radius_if_misused: "low-to-moderate"
canon_ineligible_attachments:
  - "concentration support descriptors"
  - "digest language"
  - "HUD packaging"

review_recommendation: "promote_candidate"
review_blockers: []
review_notes: >
  Best first-canon style candidate because it is narrow, useful, and reversible.
consensus_scope: >
  Review claim boundedness, same-family anchor legitimacy, acceptable ambiguity,
  and safe downstream use as comparison anchor only.


